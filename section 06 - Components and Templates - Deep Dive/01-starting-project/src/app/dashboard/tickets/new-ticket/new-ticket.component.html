<form (ngSubmit)="onSubmit(titleInput.value, textInput.value)" #form>
  <app-control label="Title">
    <!-- #input is used as target for control.component to access ContentChild -->
    <input type="text" name="title" id="title" #titleInput #input />
  </app-control>
  <app-control label="Request">
    <textarea
      type="text"
      name="request"
      id="request"
      rows="3"
      #textInput
      #input
    ></textarea>
  </app-control>
  <p>
    <!-- Since the button has the appButton component selector the btn is of type Button Component  -->
    <button appButton #btn>
      <!-- If it did not have the selector btn type would be HTMLButtonElement (standard html element) -->
      <!-- <button #btn> -->
      Submit
      <span ngProjectAs="icon">⌲</span>
    </button>
  </p>
</form>
